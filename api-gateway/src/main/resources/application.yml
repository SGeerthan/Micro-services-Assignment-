spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /${segment}
            - name: CircuitBreaker
              args:
                name: authService
                fallbackUri: forward:/fallback/auth

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/order/**
          filters:
            - RewritePath=/order/(?<segment>.*), /${segment}
            - name: CircuitBreaker
              args:
                name: orderService
                fallbackUri: forward:/fallback/order

        - id: product-service
          uri: http://product-service:8083
          predicates:
            - Path=/product/**
          filters:
            - RewritePath=/product/(?<segment>.*), /${segment}
            - name: CircuitBreaker
              args:
                name: productService
                fallbackUri: forward:/fallback/product

        - id: cart-service
          uri: http://cart-service:8084
          predicates:
            - Path=/cart/**
          filters:
            - RewritePath=/cart/(?<segment>.*), /${segment}
            - name: CircuitBreaker
              args:
                name: cartService
                fallbackUri: forward:/fallback/cart

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true