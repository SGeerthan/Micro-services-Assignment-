name: CI/CD to Azure Container Apps

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: ctsegrp-rg
      ACR_NAME: sliitmicroregistryctse
      CONTAINERAPPS_ENVIRONMENT: micro-env
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # -------------------------
      # SNYK SETUP
      # -------------------------
      - name: Set up Node.js (required for Snyk CLI)
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Snyk CLI
        run: npm install -g snyk

      # Scan all services
      - name: Snyk test - auth-service
        run: snyk test ./auth-service --severity-threshold=high

      - name: Snyk test - order-service
        run: snyk test ./order-service --severity-threshold=high

      - name: Snyk test - api-gateway
        run: snyk test ./api-gateway --severity-threshold=high

      - name: Snyk test - cart-service
        run: snyk test ./cart-service --severity-threshold=high

      - name: Snyk test - product-service
        run: snyk test ./product-service --severity-threshold=high

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name $ACR_NAME

      - name: Build Java service JARs
        run: |
          mvn -q -DskipTests clean package -f ./auth-service/pom.xml
          mvn -q -DskipTests clean package -f ./order-service/pom.xml
          mvn -q -DskipTests clean package -f ./product-service/pom.xml
          mvn -q -DskipTests clean package -f ./cart-service/pom.xml
          mvn -q -DskipTests clean package -f ./api-gateway/pom.xml

      # Build and push service images
      - name: Build and push auth-service image
        run: |
          docker build -t $ACR_NAME.azurecr.io/auth-service:$IMAGE_TAG ./auth-service
          docker tag $ACR_NAME.azurecr.io/auth-service:$IMAGE_TAG $ACR_NAME.azurecr.io/auth-service:latest
          docker push $ACR_NAME.azurecr.io/auth-service:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/auth-service:latest

      - name: Build and push order-service image
        run: |
          docker build -t $ACR_NAME.azurecr.io/order-service:$IMAGE_TAG ./order-service
          docker tag $ACR_NAME.azurecr.io/order-service:$IMAGE_TAG $ACR_NAME.azurecr.io/order-service:latest
          docker push $ACR_NAME.azurecr.io/order-service:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/order-service:latest

      - name: Build and push product-service image
        run: |
          docker build -t $ACR_NAME.azurecr.io/product-service:$IMAGE_TAG ./product-service
          docker tag $ACR_NAME.azurecr.io/product-service:$IMAGE_TAG $ACR_NAME.azurecr.io/product-service:latest
          docker push $ACR_NAME.azurecr.io/product-service:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/product-service:latest

      - name: Build and push cart-service image
        run: |
          docker build -t $ACR_NAME.azurecr.io/cart-service:$IMAGE_TAG ./cart-service
          docker tag $ACR_NAME.azurecr.io/cart-service:$IMAGE_TAG $ACR_NAME.azurecr.io/cart-service:latest
          docker push $ACR_NAME.azurecr.io/cart-service:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/cart-service:latest

      - name: Build and push api-gateway image
        run: |
          docker build -t $ACR_NAME.azurecr.io/api-gateway:$IMAGE_TAG ./api-gateway
          docker tag $ACR_NAME.azurecr.io/api-gateway:$IMAGE_TAG $ACR_NAME.azurecr.io/api-gateway:latest
          docker push $ACR_NAME.azurecr.io/api-gateway:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/api-gateway:latest

      # Deploy services to Azure Container Apps
      - name: Deploy auth-service to Azure Container Apps
        run: |
          az containerapp update \
            --name auth-service \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/auth-service:$IMAGE_TAG

      - name: Deploy order-service to Azure Container Apps
        run: |
          az containerapp update \
            --name order-service \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/order-service:$IMAGE_TAG

      - name: Deploy product-service to Azure Container Apps
        run: |
          az containerapp update \
            --name product-service \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/product-service:$IMAGE_TAG

      - name: Deploy cart-service to Azure Container Apps
        run: |
          az containerapp update \
            --name cart-service \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/cart-service:$IMAGE_TAG

      - name: Deploy api-gateway to Azure Container Apps
        run: |
          az containerapp update \
            --name api-gateway \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/api-gateway:$IMAGE_TAG \
            --set-env-vars AUTH_SERVICE_URL="https://auth-service.internal.blueplant-37c9e756.southeastasia.azurecontainerapps.io" ORDER_SERVICE_URL="https://order-service.internal.blueplant-37c9e756.southeastasia.azurecontainerapps.io" PRODUCT_SERVICE_URL="https://product-service.internal.blueplant-37c9e756.southeastasia.azurecontainerapps.io" CART_SERVICE_URL="https://cart-service.internal.blueplant-37c9e756.southeastasia.azurecontainerapps.io"

      - name: Deployment Success
        run: echo "✅ All services deployed successfully to Azure Container Apps"