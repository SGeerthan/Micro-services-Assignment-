name: CI/CD to Azure Container Apps

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: ctsegrp-rg
      ACR_NAME: sliitmicroregistryctse
      CONTAINERAPPS_ENVIRONMENT: micro-env

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name $ACR_NAME

      - name: Build Java service JARs
        run: |
          mvn -q -DskipTests clean package -f ./auth-service/pom.xml
          mvn -q -DskipTests clean package -f ./order-service/pom.xml
          mvn -q -DskipTests clean package -f ./product-service/pom.xml
          mvn -q -DskipTests clean package -f ./cart-service/pom.xml
          mvn -q -DskipTests clean package -f ./api-gateway/pom.xml

      # Build and push service images
      - name: Build and push auth-service image
        run: |
          docker build -t $ACR_NAME.azurecr.io/auth-service:v1 ./auth-service
          docker push $ACR_NAME.azurecr.io/auth-service:v1

      - name: Build and push order-service image
        run: |
          docker build -t $ACR_NAME.azurecr.io/order-service:v1 ./order-service
          docker push $ACR_NAME.azurecr.io/order-service:v1

      - name: Build and push product-service image
        run: |
          docker build -t $ACR_NAME.azurecr.io/product-service:v1 ./product-service
          docker push $ACR_NAME.azurecr.io/product-service:v1

      - name: Build and push cart-service image
        run: |
          docker build -t $ACR_NAME.azurecr.io/cart-service:v1 ./cart-service
          docker push $ACR_NAME.azurecr.io/cart-service:v1

      - name: Build and push api-gateway image
        run: |
          docker build -t $ACR_NAME.azurecr.io/api-gateway:v1 ./api-gateway
          docker push $ACR_NAME.azurecr.io/api-gateway:v1

      # Deploy services to Azure Container Apps
      - name: Deploy auth-service to Azure Container Apps
        run: |
          az containerapp update \
            --name auth-service \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/auth-service:v1 \
            --ingress internal \
            --target-port 8081

      - name: Deploy order-service to Azure Container Apps
        run: |
          az containerapp update \
            --name order-service \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/order-service:v1 \
            --ingress internal \
            --target-port 8082

      - name: Deploy product-service to Azure Container Apps
        run: |
          az containerapp update \
            --name product-service \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/product-service:v1 \
            --ingress internal \
            --target-port 8083

      - name: Deploy cart-service to Azure Container Apps
        run: |
          az containerapp update \
            --name cart-service \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/cart-service:v1 \
            --ingress internal \
            --target-port 8084

      - name: Deploy api-gateway to Azure Container Apps
        run: |
          az containerapp update \
            --name api-gateway \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/api-gateway:v1 \
            --set-env-vars AUTH_SERVICE_URL="https://auth-service.internal.blueplant-37c9e756.southeastasia.azurecontainerapps.io" ORDER_SERVICE_URL="https://order-service.internal.blueplant-37c9e756.southeastasia.azurecontainerapps.io" PRODUCT_SERVICE_URL="https://product-service.internal.blueplant-37c9e756.southeastasia.azurecontainerapps.io" CART_SERVICE_URL="https://cart-service.internal.blueplant-37c9e756.southeastasia.azurecontainerapps.io" \
            --ingress external \
            --target-port 8080

      - name: Deployment Success
        run: echo "✅ All services deployed successfully to Azure Container Apps"
